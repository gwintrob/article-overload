<!DOCTYPE html>
<html>
<head><title>Icon Preview</title>
<style>
body { background: #333; display: flex; gap: 40px; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-wrap: wrap; }
.preview { text-align: center; color: #fff; font-family: sans-serif; }
.preview img { display: block; margin: 0 auto 8px; image-rendering: pixelated; }
</style>
</head>
<body>
<div class="preview"><img src="icon.svg?v=5" width="128" height="128"/><span>128px</span></div>
<div class="preview"><img src="icon.svg?v=5" width="48" height="48"/><span>48px</span></div>
<div class="preview"><img src="icon.svg?v=5" width="32" height="32"/><span>32px</span></div>
<div class="preview"><img src="icon.svg?v=5" width="16" height="16"/><span>16px</span></div>
</body>
</html>
